      or (starts-with(@id, concat('st-level-features', '-')) and not(translate(substring-after(@id,
      concat('st-level-features', '-')), '0123456789', '')))]//section[@id='grave-speech-3'
      or (starts-with(@id, concat('grave-speech-3', '-')) and not(translate(substring-after(@id,
      concat('grave-speech-3', '-')), '0123456789', '')))]
